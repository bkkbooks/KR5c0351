  - {type: variant, offset: 0, length: 320, content: 許眞君石函記序之五眞君姓許名遜字敬之汝南人其祖父世慕至道西晋武帝太康元年舉孝廉不就朝廷加以禮聘眞君不得已拜蜀郡旌陽縣令因世亂棄官入道精志修煉乃踵孝道明王之教眞仙飛舉之宗功著行成收斬蛇蜃呪施符水療病回生不計其數後於東晋孝武帝寧康二年甲戌八月一日於洪州西山感上帝玉詔舉家四十二口并百好拔宅上昇乃留下一石函謂曰世變時遷爲時之記後爲張守發其函得函中祕文九篇乃眞君修煉金丹之上道也名石函記西山玉隆高士謝觀復洎高弟清虚羽衣朱明叔東嘉鄭道全等遞相授受傳至于今此文乃上品升舉之機關非丹術旁門之小道宿有仙骨獲遇斯文得之者寳而藏諸非人勿示篇中誓願深重請細詧焉石函目録卷上太陽元晶論日月雌雄論藥母論藥物是非論丹砂證道歌卷下聖石指玄篇神室玄明論金鼎虚無論明堂正德論, CK-KZ: ''}
