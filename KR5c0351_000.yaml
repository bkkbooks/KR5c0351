body:
  text: 卷上太陽元晶論日月雌雄論藥母論藥物是非論丹砂證道歌卷下聖石指玄篇神室玄明論金鼎虛無論明堂正德論
  hash: sha256:e2a68fb74b73f5496ce143b947430770a2759c45eeeb54b7d638ef40529a17e4
