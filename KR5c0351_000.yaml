front:
  text: 許真君石函記序之五真君姓許名遜字敬之汝南人其祖父世慕至道西晋武帝太康元年舉孝廉不就朝廷加以禮聘真君不得已拜蜀郡旌陽縣令因世亂棄官入道精志修煉乃踵孝道明王之教真仙飛舉之宗功著行成收斬蛇蜃呪施符水療病回生不計其數後於東晋孝武帝寧康二年甲戌八月一日於洪州西山感上帝玉詔舉家四十二口并百好拔宅上升乃留下一石函謂曰世變時遷為時之記後為張守發其函得函中祕文九篇乃真君修煉金丹之上道也名石函記西山玉隆高士謝觀復洎高弟清虛羽衣朱明叔東嘉鄭道全等遞相授受傳至于今此文乃上品升舉之機關非丹術旁門之小道宿有仙骨獲遇斯文得之者寶而藏諸非人勿示篇中誓願深重請細察焉石函目録
  hash: sha256:9eb65b190dca0f1b991676ac4689770a91950ab220c0dd987bee7ae882da2124
