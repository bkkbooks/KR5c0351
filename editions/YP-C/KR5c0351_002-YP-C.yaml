body:
  text: 聖石指玄篇萬象虛生何所約妙化本因丹汞作扶桑東出金烏精炎燄羽毛光爍爍飛走陽火名日魂暮落朝榮晦還朔紅輪駕起景陽車循九還六地六成水遊匡郭現出眞精透體砂爍石流金孰辨博光濟乾坤受日霞萬物生因丹化作丹砂則非有爲物不煉五金燒八石太虛中有顆還丹化作夜明珠不識珠光鬱鬱現丹霄玉兔澄輝逐卦爻坤生震兌乾將巽艮坤終始復陽爻陽往陰來神聖藥仙眞號曰紫金膏一點瞽人雙目明二點枯骨再生肉三點頑石化作金四點長河化酥酪五點春華不墮葉日月長開永不絕凡磁瓦礫盡成金朽物沾之色變新勞瘵傳屍若得藥服之立效便身輕愚者只言身内物盡向房中尋配匹卽非身内氣和精精去氣消何所入百神解散盡遺亡老倒形枯成癖疾聖人言此總成非爭如煉取黃金液師言金液昔何因盤古初分大道根本是龍精生虎髓甲乙庚辛化壬癸丙丁朱雀火神飛飛下玄天合戊己上降下升三十六南極入地三十六度北極出地三十六度赫赤交躔在南北微微騰倒天地精妙造盡從三五一五日一候三五十五日三五復歸於一三五與一何所云生天生地亦生人生天固有囘天力生地堅牢萬物榮生人人中分貴賤福淺丹砂豈能煉志士先須認取鉛不辨眞鉛枉修煉天有五賊見者昌鉛舍五彩態殊祥生自無名天地始有名萬物母非凡非凡通聖人難識卽在玄元藏恍惚杳杳冥冥期至精激陽爲電生光明光明盤旋分五色下有鉛精人不識春元草木夏如冰秋不聚霜冬没雪含和長養漸通靈黃芽不與世鉛親黃芽養經八百歲化爲青汞卒難尋青汞水銀難尋覓周流四大無窮極青汞又經八百歲化作青金轉難得青金本是青龍骨生數爲三成數八三八數終汞氣青化作青埃飛上升上升永作仙人祿浩刧元明爲五福翡翠景雲曰青埃升赴清都歸所屬翠華進入紫陽宮昭陽殿起龍光紅光明晃耀照無窮極陽絕景陰消空鉛分五彩燄飛空青赤白黑黃居中熒熒皎皎色融融紫神瑞氣丹霞籠萬神呼吸鉛氣通玉童玉女啖太空飡食其輝天老翁羣仙飲食壽無窮先朝玉帝現玄穹說是還丹藥祖宗此鉛不與世鉛同懸空晃朗朗懸空落霞光透水晶宮隱明日月氣雙爲隠明内昭金鷄歸日雞正屬兌容呼吸風雲會虎龍龍呼於虎虎呼龍浩氣結成眞至藥人飡迅速入雲中改形換骨身飛空貌同元始天尊容共分一氣天地同返本還源是祖宗說盡萬般差别法總與金砂事不同住世鉛精五金主七十二石之父母煉士英靈採得來傾下先須去陰土鉛砂摶成如土塊六一固濟相護愛用火煆煉一晝夜火滅煙消土化灰騰鉛倒製入灰池火發鉛鎔化神水神水元因出白金先取白金爲鼎器白金卽是水銀胎返本還源水銀製水銀便是長生藥不是凡間水銀作朱雀炎空飛下來摧折羽毛頭與腳水銀從此不能飛鍊作金丹爲大藥更言恐怕泄天機此言聞者世間稀不是叮嚀頻囑付好色貪財如獸畜如違戒約有神明攝入酆都罪不輕更有九泉無限苦不可等閑容易語等閑容易泄非人萬劫沉淪受冥苦神室圓明論凡世間萬事有一事之非凡非凡者乃眞一之事也述還丹之道也學者甚多皆不見根源難窮本末所以千舉萬敗竟無一成果世稀遇者哉凡修大丹要在築壇旺方取土地擇吉祥不得妄爲妄爲招殃壇有三級兮方八尺分丈舊作分八非是上下不等兮各有繩墨上有一層高二六上按九宮兮九曜九位上方闊一丈六兮二八之數中有一層高二五中分八卦兮壇中之心腹中方闊二丈四兮按二十四氣下有一層高二六下列八門兮開閉有度下方闊二丈八兮按二十八宿四面創劍兮鎭壓四方八面懸鏡兮照滅邪殃掛五色綵兮依位逐方壇上有竈兮名曰神爐神爐出没兮爐而收火氣收爐火氣兮而聚鼎鼎受火氣兮而養神室神室圓明兮非圓非明非圓兮狀如雞子非明兮逐月而生金鼎偃月如鍋釜神室爲子兩分尖入鼎定鼎鼎難定入鼎橫胎倒鼎偏倒鼎明堂失正德橫胎用定亂陰陽日月不交金水竭情性相離不相接男冠女笄失時年氣不交兮體不合只因法象有偏頗致使乾坤不交接坎離南北亂縱橫東西卯酉難分別水火失位金木差方龍潛變匿失天際之歸舟殺氣隨風耗散則虎無形者蓋謂金胎失產鷄兔相離覆載無端傾失神水若欲獲鳥並求兔須憑匠手立乾坤入鼎調燮重整陰陽運行日月始得依方逐位金木交併運火氣而生日晶伏金水而滋月魄東西南北之氣並降歸金鼎之中虎瑞龍祥咸結於杳冥之内混沌交光輝輝寥廓寥廓眞空眞空煉妙煉妙眞空眞空隱奧隱空煉妙妙煉庚金妙分少女兌體生壬此言煉妙成神室神室明開神出没出爲明沒爲暗此言煉妙合爲靈靈質玲瓏神爲氣氣無質氣入杳冥通恍惚恍惚中居中有靈靈言妙氣合爲神神運氣氣生靈靈爲子氣爲母玄元聖祖豈虛言又言煉神合於道煉神合道非常道宜向陰符細尋討觀天之道天若何天有銀河室神室有何室有星河布列宿張翼午飛兮虛危子逐二十八宿運推兮水火交纒在南北觜參西酉相命合氏房東卯白虎青龍在兩傍虎嘯風生龍吐霧霧霞紅紅勝火亂紅碎碎成顆顆顆粒顆粒眞珠紅紅英紫脉生金公金公水土相並合煉就黃芽成白雪紫砂紅粉亂飄飄亂飄飄兮青龍膏紅粉少白虎老煉就龍膏並虎腦長生殿生如意寶點金萬兩何足道能點衰翁永不老長生殿藥萬萬春麗日滋生天柱明天柱明時魂交魄蟾蜍兔髓汞浮白魄感魂華生玉芝廣寒神舍嫦娥宅飛光砂起震離東金烏太陽飛入廣寒宮燦火煙霞龍吐霧絳砂墜落紫金紅紅英紫金金英紫金英紫篆紫霞縷縷金光透紫霞煙紅紫混成藏金色紫華耀日升金碧金碧空青生紫華翠霞澄碧接青霞霞英靈景靈砂液砂脫紅離青碧色象則成形現杳冥散則龍潛如鬼匿此言神室中景象如鬼匿飛走水火難尋覓砂汞附形生水火不得眞鉛實不可實不可砂隱鉛中石隱火擊石見火火生煙不擊無煙體自然砂隱鉛中亦自然水養火滋才舊作才感激感而遂通生金液金液通神萬古靈焰焰通靈氣與神神奔氣運風雷鼓鼓動風雷火生土坎戊玄土金爲父離己牝土汞爲母汞爲母太上語無天下有始兮以爲天下母天上蒼蒼晶靈飛光眞靈感召砂汞飛光飛光砂起舊本無炎火逼逼逐熬熬聲悲泣其聲河上應虛北方宿張南方宿虛張何生水激火烹火烹兮姹女氣索水激兮嬰兒脫黑姹女嬰兒內水火水激火烹凡水火脫黑則潔白見寶氣索則色變紅離變紅離太陽明太陽舒光爲日新日初新汞初凝鉛汞初凝兮丹象何陳丹象於天出爲日月日爲流珠元氣虛無透金入石神出鬼没神出兮神升天門卽曰天魂鬼没兮鬼入地戸卽曰地魄天魂地魄周宗祖互爲室宅分子午水火交火生土二土成圭銀化金離中火舍坎中精離中精光天一伏藏天藏其光明亦不出隱明內照外通光耀光耀圓空光明相通是金火交光分明照耀耀者離雌照者坎雄離雌坎雄光明相通通雌入雄變化無窮聖日聖月靈運潜通紫靈神藥藥有神通通神陽火燄燄燒空飛光布氣感而遂通玉芝丹質透霞入紅入紅兮火華疊疊透霞兮華彩重重華因二景眞木眞金眞木東方兮震雷火生震爲長男兮震木生火震又爲龍龍從火行眞其西方兮兌藏金水水能調庚兌爲少女虎嘯風生風雨形聲迅速不停形聲絕影金木交併二氣降靈摶成金精金精大藥中有五行五行神水神水金漿神水神火兩物相親火中水處水中含金太陽眞汞受金氣震合庚辛入酉位震受陽符漸成九爽利舒光震初有從初入轉震生靈坤初六變成初九震照六庚庚屬酉震當五日爲一候震來受符六十時陽遁上元終則始終於震卦始成兌兌逐陰符坤六二交爻變象莫能窺六二換陽成九二此是金來入火鄉月行丁位半輪光金何爲火何以兌感六丁丁屬巳兌屬金丁屬火金火相交火生土土生金金火始兌當五日爲一候兌來受符六十時陽遁中元終則始終於兌卦始成乾陽往陰來任自然陽極乾陰極坤乾終九陰終六六二六三兮三變成九九三夕惕兮成乾乾體盛明兮圓照東方甲六甲屬乾兮乾當三五乾當五日爲一候乾來受符六十時陽遁下元終則始陽遁下元兮前三十五積一百八十時兮象半年德就乾體交二八陽極陰生兮乾體滿退陽就陰兮轉受於巽巽統陰符坤初六六辛成巽成自十六十六至二十六巽將生艮巽當五日爲一候巽來受符六十時陰遁上元終則始終於巽卦始成艮巽艮交爻象已定象已定艮合六丙當受巽六一巽六二艮六三加臨陰巳盛陰盛水旺火將殘二十三日屬下弦下弦艮火自合虧艮當五日爲一候艮來受符六十時陰遁中元終則始終於艮卦始成坤坤象黑乙癸六三兮坤抱乙六一屬坤兮三十日坤當五日爲一候坤來受符六十時陰遁下元終則始始於前前三五終於後後三五六候昏明受寒暑昏明晦朔運推移晦積一百八十時兮象半年前弦之後後弦前六候三旬象一年一年全用十二節卦火虧盈逐一月一月六候一周天先天而後績後天時計一萬零三千一萬三千符火足符火數足準三年三年火煉流珠鼎鼎似招陽聚天鏡鼎中光映日霞紅霞映日魂來合鼎合鼎日紅傳晷景晷景南行日至丙日至丙午爻汞沖神室神飲景飲景沉醉醉復醒神氣沖和神酩酊神酩酊綿綿燄燄燄通靈光運圓光明鏡面火晶盤晶盤散撒如金粟碎如柳麥色黃深太倉神舍盤盈盈盈盈閃爍晶赫赫夜屬月魂鼎象白鼎象白兮是月圓鼎通天天上月圓鼎亦然天上鼎內卦屬乾乾鼎圓明運月圓光如鏡面水晶盤煉出銀蟾似月圓月圓望盈巽損側晦屬陰符鼎象黑朔象白晦象黑黑白虧盈或圓缺圓缺之中月明中夜聽更漏漏才終當日視晷景盤久晷景忘前日落酉落霞紅象應丹砂鼎內同映結紅霞鼎玲瓏玲瓏火化華芙蓉火符結撮曰洪濛洪濛不是尋常物入口美味甘如蜜因食不覺體隨風輕舉飛騰翫太空翫太空顯仙宗莫言來世又相逢太愚蒙休談妙有說眞空說眞空是非同空卽是色色是空其色蒼蒼照耀紅與君說破我家風太陽移在月明中月明太陽天上藥人能服之跨鸞鶴萬法千門都是錯學取吾家這一著這一著跳出五行眞快樂金鼎虛無論金鼎抱神室之郊余聞上古修丹須憑妙法多生夙契相遇成眞是謂共獲生天生地之靈也或問天地之靈生於何所答曰鑿開混沌土分黃黑生天地之金精深藏溟涬爲道根本羽客受得可造金鼎且金鼎者夫何爲而生何爲而有曰生於自然無形無名之始有名萬物之母子得金精作命基命基只是金華池華池神水太淵晶太淵金晶絕萬靈萬靈號曰萬物母先聖將來爲鼎金鼎金元來藥裏尋尋來不是世間金世間金何足異金鼎鼎金通天地通得三光鼎受符汞侵金鼎氣生虛虛生氣氣生虛無生有有生無元有虛無虛化樞樞紐的然眞種類何憂水火不吹噓水潤下水在上魄吸水銀魂蕩樣火在下火炎上火養水生逐爻象陽象流珠水作丹陰象隨金逐水長金水火名三五金主象外汞相處震青龍兌白虎乾體圓明金三五金漸晦水漸舉白虎虧盈變黑虎玄武陰生入癸鄉巽艮還坤水三五金爲子水爲母陰符陽火分子午剛柔文武運推移火生火滅化爲土此是火三五一月三十日三五一十五日屬金三五一十五日屬水方謂金水雨停是謂金三五水三五十五日火生十五日火滅是謂火三五水火交四維金作火將衰一作生火則終水則始衰則終生則始定浮沉兮金化水分刻漏兮白化黑黑則終白則始黑白往來逐月矣知白來守黑去三百六十有五度開生門閉死戸