難圖且有者土金玄黃之器得火而施張得則設生感召始則若有若無若有則霏霏微微道隱希夷希則感而氤氲夷則動而氤氲希夷感動氤氲橐籥始之肇基立兆已萌太陰化生化者神運氣化凝委而成形質形質蒼蒼霞火流光光華精結精紅透魄紅影來朝結就玉霄絳霄霞結號離紅屑離紅飛揚輕紅翺翔神物飛揚五色翺翔翺翔五色太陽精光青白黑黃黃居中央君父太陽太陽黃道黃道轉北黑道𢌞還迴還應律律呂相生冬至一陽曰何太短夜何太長月四夜九陰勝其陽陽生未復晷景滋生時計月時至日生冬至極冬至極九日之中進一刻五九五刻進則終四十五日立春功立春之後得九日九日之中進一刻五九五刻進則終四十五日春分同春分之後得九日九日之中進一刻五九五刻進則終四十五日立夏同立夏之後又九日九十之中進一刻五九五刻進則終四十五日四節同夏至日中六十刻晝景漸長日南極夏至後退得九日九日之中退一刻五九五刻退則終四十五日立秋功立秋之後得九日九日之中退一刻五九五刻退則終四十五日秋分同秋分之後得九日九日之中退一刻五九五刻退則終四十五日立冬同立冬之後得九日九日之中退一刻五九五刻退則終四十五日八節終八節三百六十日晝夜三萬六千刻三萬六千時計刻時訐刻冬至日中四十刻日景攛梭如電激太陽疾速不停光自然陽氣索滅藏陽藏陰用無休息陰生陽長六十刻陽終氣升陽光出陽光出九華明九華光裏翠華青翠華神所尊光明尊明神黃神昇明堂神稱帝皇帝皇傳赤赤帝度色青帝受德白帝生光黑帝玄黃五帝混合混合神光神光鬱鬱神用無極神極受正正其神色神藏其室神黃神黑黃黑神精黃者金神黑者北靈黑者水基內懷其精其精甚靈其精甚堅太上曰其精甚眞其中有信信無不應信應者天符也天符照明飛符恍靈靈運潛應應神紫靈紫靈神藥藥有神靈神藥靈靈化元之英神與氣精神昇紫雲其氣運轉甲丙庚壬庚壬乃金水相盈甲丙是水火滋榮二火成炎二木成林火木眷戀姊妹弟兄坎離震兌男女相親男冠少陽女笄少陰陰陽合度七八十五之數七八數訖九乾六坤相得晦朔弦望四者三十九六之數老陽乾父老陰坤母因母致親比夫人倫父之制子子之制孫生生相續親之又親鉛汞相親無異人倫陰陽交合純粹之精靈續其景景續其靈景靈宮裏虎嘯龍吟五音互奏六律陽明陽明神光照耀明堂明堂正德君臣相得施仁設義講武修文忠信禮智五常和平皇化天下富國安民諸辰經厯神氣滿室五氣交併神降奔突氣如煙霧交合神御交合之道順其氣序氣序無差昏明寒暑晝暑夜寒陽流陰注廣寒宮結水昌砂砂結玲瓏若馬牙馬牙本是金烏骨赫赫日精歸月窟月窟日照白明堂明堂便是金水室金水互相生金潤生黃液液生鼎沸汞流神水瀑湧三三重疊累累凝如堅冰龍蟠虎視虎性龍情隨光逐明光中恍惚明中杳冥丹砂靈英靈英之質生於神明陰神陽明積陽以陰陰以神之陽以明之陰陽合度化育之基化者謂日有三照育者謂月有三移日月合氣二氣相推水一火二合而成三三生萬物三變至極三者汞也汞變生靈靈英獨秀異寶奇珍五行神物藥就希夷人間術士必不能窺唯有志者懷而待時得眞五行之妙用假凡五行之水火五行生剋其理自然聖人神而明之以知天地之化不過曲成萬物通乎晝夜之道晝視晷度准則天符夜聽更漏上察河圖月紀低昴星稀南北虛北方張南方下應於鼎中神龜隨火而奔逐黑虎浮來白虎穴赤龍跳入青龍窟二藥還元復混融丹砂合體入金公汞與鉛合砂與金親金作神室明堂正德恍朗玄宮乾坤合同坤生震龍陽符復行離魂入魄運轉天罡水激火發鼎釜俱鳴陰陽運轉震受庚辛金本尅木夫何以生月行丁位金入火鄉火盛消金金代木榮火滅爲土土能生金金能生水水能生木相尅相生互爲父母父母生子子繼父母坤生震兌兌生坤體三五氣足三光合度兔魄生光月滿東方月滿復虧陰侵已前十六受統陰符復行艮直丙南二十有三三五候足金入水鄉坤符蕩蕩水歸北方凝而成金化而爲水火隨爻動象逐火生出没神爐明藏偃月長養金胎化生金液凝如黃酥碎如金粟金色透明從黃返赤熠熠火生而成還丹開爐倒鼎迸出霞光金砂如粉研細如霜和匀摶搦摶搦陰陽九成黍粒謝天祭畢萬斛明珠難換一粒一粒纔服身生羽翼呼風召雷萬神侍側更換四時留連日月冬變炎暑夏飛霜雪秋發春華春飄黃葉所謂宇宙在乎手萬化生乎身者也長河化酥酪點金過北斗吾不敢虛說識取無中有無中生天地我同天地久其道至禁訣之在口妄示凡流必遭殃咎愼密修持神明護佑廣施陰德神仙必有
