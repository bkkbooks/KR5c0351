body:
  text: 聖石指玄篇萬象虛生何所約妙化本因丹汞作扶桑東出金烏精炎焰羽毛光爍爍飛走陽火名曰魂暮落朝榮晦還朔紅輪駕起景陽車循亡還合遊匡郭現出真精透體砂爍石流金孰辨博光濟乾坤受日霞萬物生因丹化作丹砂則非有為物不煉五金燒八石太虛中有顆還丹化作夜明珠不識珠光鬱鬱現丹霄玉兔澄輝逐卦爻坤生震兊乾將巽艮坤終始復陽爻陽往陰來神聖藥仙真號曰紫金膏一點瞽人雙目明二點枯骨再生肉三點頑石化作金四點長河化酥酪五點春華不墮葉日月長開永不絶凡磁瓦礫盡成金朽物沾之色變新勞瘵傳尸若得藥服之立效便身輕愚者只言身內物盡向房中尋配匹即非身內氣和精精去氣消何所入百神解散盡遺亡老倒形枯成癖疾聖人言此總成非爭如煉取黃金液師言金液昔何因盤古初分大道根本是龍精生虎髓甲乙庚辛化壬癸丙丁朱雀火神飛飛下玄天合戊己上降下升三十六赫赤交躔在南北微微騰倒天地精妙造盡從三五一三五與一何所云生天生地亦生人生天能有回天力生地堅牢萬物榮生人人中分貴賤福淺丹砂豈能煉志士先須認取鉛不辨真鉛枉修煉天有五賊見者昌鉛舍五彩態殊祥生自無名天地始有名萬物母非凡非凡通聖人難識即在玄元藏恍惚杳杳冥冥期至精激陽為電生光明光明盤旋分五色下有鉛精人不識春元草木夏如冰秋不聚霜冬沒雪含和長養漸通靈黃芽不與世鉛親黃芽養經八百歲化為青汞卒難尋青汞水銀難尋覓周流四大無窮極青汞又經八百歲化作青金轉難得青金本是青龍骨生數為三成數八三八數終汞氣青化作青埃飛上升上升永作仙人祿浩劫元明為五福翡翠景雲曰青埃升赴清都歸所屬翠華進入紫陽宫昭陽殿起龍光紅光明晃耀照無窮極陽絶景陰消空鉛分五彩焰飛空青赤白黑黃居中熒熒皎皎色融融紫神瑞氣丹霞籠萬神呼吸鉛氣通玉童玉女啖太空餐食其輝天老翁羣仙飲食壽無窮先朝玉帝現玄穹説是還丹藥祖宗此鉛不與世鉛同懸空晃朗朗懸空落霞光透水晶宫隱明內昭金雞容呼吸風雲會虎龍龍呼於虎虎呼龍浩氣結成真至藥人餐迅速入雲中改形换骨身飛空貌同元始天尊容共分一氣天地同返本還源是祖宗説盡萬般差别法總與金砂事不同住世鉛精五金主七十二石之父母煉士英靈採得來傾下先須去陰土鉛砂摶成如土塊六一固濟相愛護用火煅煉一晝夜火滅煙消土化灰騰鉛倒製入灰池火發鉛鎔化神水神水元因出白金先取白金為鼎器白金即是水銀胎返本還源水銀製水銀便是長生藥不是凡間水銀作朱雀炎空飛下來摧折羽毛頭與腳水銀緣此不能飛鍊作金丹為大藥更言恐怕泄天機此言聞者世間稀不是叮嚀頻囑付好色貪財如獸畜如違戒約有神明攝入酆都罪不輕更有九泉無限苦不可等間容易語等間容易泄非人萬劫沉淪受冥苦神室圓明論凡世間萬事有一事之非凡非凡者乃真一之事也述還丹之道也學者甚多皆不見根源難窮本末所以千舉萬敗竟無成果世稀遇者哉凡修大丹要在築壇旺方取土地擇吉祥不得妄為妄為招殃壇有三級兮方八尺上下不等兮各有繩墨上有一層高二六上按九宫兮九曜九位上方闊一丈六兮二八之數中有一層高二五中分八卦兮壇中之心腹中方闊二丈四兮按二十四氣下有一層高二六下列八門兮開閉有度下方闊二丈八兮按二十八宿四面創劍兮鎮壓四方八面懸鏡兮照滅邪殃挂五色綵兮依位逐方壇上有竈兮名曰神爐神爐出沒兮爐收火氣收火氣兮而聚鼎鼎受火氣兮養神室神室圓明兮非圓非明非圓兮狀如雞子非明兮逐月而生金鼎偃月如鍋釜神室為子兩分尖入鼎定鼎鼎難定入鼎橫胎倒鼎偏倒鼎明堂失正德橫胎用定亂陰陽日月不交金水竭情性相離不相接男冠女笄失時年氣不交兮體不合只因法象有偏頗致使乾坤不交接坎離南北亂縱橫東西卯酉難分别水火失位金木差方龍潛變匿失天際之歸舟殺氣隨風耗散則虎無形者蓋謂金胎失産雞兔相離覆載無端傾失神水若欲求烏獲兔須憑匠手立乾坤入鼎調燮重整陰陽運日月始得依方逐位金木交併運火氣而生日晶伏金水而滋月魄東西南北之氣並降歸金鼎之中虎瑞龍祥咸結於杳冥之內混沌交光輝輝寥廓寥廓真空真空煉妙煉妙真空真空隱奧隱空煉妙煉庚金妙分少女兊體生壬此言煉妙成神室神室明開神出沒出為明此言煉妙合為靈靈質玲瓏神為氣氣無質氣入杳冥通恍惚恍惚中居中有靈靈言妙氣合為神神運氣氣生靈靈為子氣為母玄元聖祖豈虛言又言煉神合於道煉神合道非常道宜向陰符細尋討觀天之道天若何天有銀河室有何室有星河布列宿張翼飛兮虛危逐二十八宿運推兮水火交躔在南北觜參相命合氏房白虎青龍在兩傍虎嘯風生龍吐霧霧霞紅紅勝火亂紅碎碎成顆顆顆粒顆粒真珠紅紅英紫脈生金公金公水土相並合煉就黃芽成白雪紫砂紅粉亂飄飄亂飄飄兮青龍膏紅粉少白虎老煉就龍膏並虎腦長生殿生如意寶點金萬兩何足道何足道能點衰翁永不老長生殿藥萬萬春麗日滋生天柱明天柱明時魂交魄蟾蜍兔髓汞浮白魄感魂華生玉芝廣寒神舍姮娥宅飛光砂起震離東金為飛入廣寒宫燦火煙霞龍吐霧絳砂墜落紫金紅紅英紫金金英紫金英紫篆紫霞縷縷金光透紫霞煙紅紫混成藏金色紫華耀日升金碧金碧空青生紫華翠霞澄碧接青霞霞英靈景靈砂液砂脫離紅青碧色象則成形現杳冥散則龍潛如鬼匿如鬼匿飛走水火難尋覓砂汞附形生水火不得真鉛實不可實不可砂隱鉛中石隱火擊石見火火生煙不擊無煙體自然砂隱鉛中亦自然水養火滋