body:
  text: 大陽元晶論玄元大道無象無形感於自然而有動靜動者元陽也元陽即元精元精生真火發生於玄玄之際離合而成魂乃日之始判也明出扶桑九氣澄輝騰光遍照普天之下所謂陽明之輝紅離透景也晶明照耀湧出龍光結成金霞玉氣珠彩祥烟瑞光滿於空中雲藏九重聖藏雲光賢藏雲光金藏雲光玉藏雲光珠藏雲光香藏雲光華藏雲光水藏雲光火藏雲光放種種光洞照天地分霞逐彩布氣生靈生靈者始生一一生二二生三三生萬物也水陸並濟不可勝計至於幽陰糞壤之中堅剛頑石之所山巖草木生地成形善走能飛凶妖惡怪無不遍也無不通也且能飛者有尋妖逐怪之禽善走者有數夫不可當之獸至大有駝牛象馬之畜至小有芥粟微末之蟲朽蠹腐化胎生卵濕含靈蠢動無不從也無不由也各各禀性分形因儀化質隨方逐位各分其色得紅而紅得黑而黑得青而青得白而白得黃而黃五行變易感位而生豈假染哉至於含化育彩含化者石中感氣化而生靈育彩者乃色分淺白輕黃淡紅微翠深青沉黑異緑奇紅妙顔絶色各得其態皆神運氣化而成自然之質也物得之者氣禀有淺深故色象無定體任其大道自化者也故云無形之形神化之化可謂道也所謂在天懸象在地成形在石成珍聚精而為寶寶即光明也奇哉大道如是孰能結金華也火盛消金金伐木榮木榮者表陽而枝布裏陰而華施陰真君云金華生兮天地寶人會此言真至道也須臾時分斗轉象逐虧盈盈則木盛而堅青虧則華伐而凋零何也始則陰陽相伐而成者道之委也伐則華殘亂落如飄紅粉是魂躍弄精神輕紅飛魂靈紅有淺深粉有重輕色深體輕飛而炎上者若紫霜玄蓋在鼎凝結即地黃金粉色淺體重養之色變庚黃是火養鮫鮹乃丹陽换骨也魂隨魄住魄逐魂生魂耀紫華魄以收陽收陽魂氣入魄腹藏魂在魄腹日月氣雙龍呼虎彩虎吸龍光二氣吞併籠罩四方合和四象氣禀中央故氣一變而為水二變而為砂三變而為汞四變而為金五變而成丹此丹聚天地之靈晶奪日月之光明攝坎離之水火追地魄合天魂龍虎作丹砂飛烏走兔華和光同入室唯尊九五家藥物是非理白虎青龍髓根蒂出黃芽金銀滿我家若將濟人命人命永年華得服之者飛天涉水龍鶴可駕此無它皆之所化也藥化者火得神用藥有靈通道合自然功成妙矣或問調和鼎鼐吸九龍紅日之膏膘其義何哉答曰鉛為神器器與神通器因神化神器合和共為一休自然呼吸相應則神隨吸至光逐神彩霞落青雲琉紅墜速靈晶上降撮歸水府龍官養之紫壽金胎真氣化為金液潜隨造化汞自然生經歷十二時中循環戊己火分四正則二至二分二至則子午辰論之則千變萬化出入虛無開張衆妙之門現出升天藥祖得而修之豈不長生升雲飛朝玉帝為清真靈妙之神仙豈容易而求哉此道真祕煉士罕得而聞之所以流浪生死去仙道遠矣且夫龍光者乃火中之精晶中發明明中出光光中生焰炎焰通靈光明熾盛中有金碧空青圓光九萬廣曠無邊熒熒鬱儀之光耀太陽南明太陰北黑南北相契兩神相得男女相和水火相濟水得火而生光明也夫太淵玄英者純黑體也潜形沈彩豈能化現玄英黑月因抱陽之氣得以生明積陽易陰成其歲月陽居其數推遷不止故有圓缺虧盈常在晦朔之間晦而生暗朔而生明故三日陽生震動於東太陽鬱儀之光結璘生明寄體西方之位諭如結璘友於東西道在得朋喪朋是謂鬱儀結璘也大哉太陽鬱儀之光淵明四隅歸光於中名曰五德五德者五星也光分萬象各得微明為月夜照曉則藏輝晝夜交光乾坤合體也謂月含其光是日之精是謂交光曉出於東暮落於西故曰合體大丹若不以日月交光乾坤合體更假何物而為之乎則非人間水銀朱砂五金八石所謂太陽玄元之妙也乃飛魂騰化則至精至靈感而遂通則至神至聖非熒熒鬱儀之光且孰如是也然則日月循環推移於上而成其歲功於下也日來月往南而復北北而復南故有生死之道也死者謂夏至之後日窮南陸陰氣以盛陽氣漸消道窮既極歸於坤元萬物所以死也而極於亥生者冬至之後日窮北陸陽氣漸長整乎乾元亨而得利貞萬物所以生也而極於己日則運移南北故有生死之道也且夫冬夏二至春秋二分乃天地之四正春生夏長秋殺冬藏蓋順天地陰陽生萬物也此夫大還丹之妙用其為一體也所謂法天象地鑄鼎泥爐須擇福地名山方可建立壇宇山要異秀地貴朝陽虎勢龍峰朝山曡水常有奇禽異獸隱寶藏珍遠隔丘墳人希跡絶自然招福迎祥凡用必生於賢貴可作煉丹之所也聖人能體天之道法地之生把日捉月包乾褁坤欲得烏精先求兔髓乃義皇之取象也先文後武合易道而行焉水火抽添得在於神功妙用自然陽生於金室也且夫陽生於金室也且夫陽生者復子時興黃鍾應律陽氣通行漸歷臨泰至己則乾剛數盡坤柔將至陰生姤午漸歷否剝坤亥將終運移歲月丹道將成子出母胞脫胎神化姤午是離火生汞也復子是坎水生鉛也汞因鉛結鉛因汞伏乃子母想戀而成丹也自合自然至精至妙不可不思也要在細求真訣志悟玄通别假驗真是非可見吾因達日月懸明之象千變萬化之機生生浩浩無窮無極得之者豈不壽同天地何得輕議於非人哉故少立道論非成篇軸述此言之精為丹砂之祕籙如同口訣聽吾所囑妄傳非人殃禍疾速戒之戒之日月雌雄論夫南華至極金闕神室圓明廣大浩劫無窮輪須彌兮無差曉夜霞散落兮處暗處明循環九十萬億行健而布氣生靈日華天寶龍光照耀烈火霞明焰焰通靈通靈達聖恍朗飛魂魂飛晶靈透體光明光圓九萬周匝金城陽洞之中空青之林須神龍化中有金神金剛密跡紫霞鬱鬱紫壽紫神霞英英生紫壽紫生霞英紫靈潜應而出紫真青陽紫極至真至靈生生相績元始元晶者晶乃英靈獨透元始者為萬寶之初先也傳萬氣之祖氣藏萬物之元氣氯本無質神運氣化上則經天下則緯地交躔如度合景如梭一往一來南而復北日道南行萬物形消數極日回北陸萬物潜應皆生黑赤二道交躔黃道運行南北人能觀天之道執天之行招攝龍晶虎餐霞餌須是玄門匠手能修金鼎調燮則以陰陽盜虛無自然成質虛無何有象逐何生幽陰隱兮內懷鉛德火動兮外陽舞空勝光八萬丈下臨神室無窮流霞駐景深入虛極之庭補助河東運入明堂正德寶華光滿五彩霞生兮化青青之土火動兮變灼灼之紅蓮慘陰無光兮真鉛沉黑舒陽現明兮真汞浮白潔白見寶兮可造黃金魂定魄凝兮片片霞新馬齒如霜兮水銀成粉能點死尸兮歸魂復醒其功莫測兮鬼神莫能驅其奧火數難明兮至聖莫能知其用玄元妙化若有若無若有者真鉛而有象若無者火自於虛無離火虛化兮華化火華化全憑兮火化功孰能用兮無中化火丹砂就兮火化無中有火隨爻變無遂火無生丙辛之氣兮化真水而滋乙庚化真金丁壬之氣兮化真木能滋戊癸化真火甲己之氣化真土土能生萬物為丹母父母傳胎列名九九道元年是曾祖子子孫孫子繼父乾道成男坤道女青道氣出黃道東迅雷忽發升青空雷天大壯震東卯四陽應候榆華老凋零落葉亂紛紛斗轉星移魁在卯白道氣出黃道西鬱鬱金華生金雞金生西旺兊西酉薺麥何曾不衰朽四陰風地觀斜陽斗轉星移罡在酉赤道氣出黃道南熒熒赫赫常炎炎正陽火旺離南午巳午至丁一陰祖天風遁起火瓓珊盛極則衰衰在午黑道氣出黃道北華池神水元烏黑黑中漸長一陽生復卦因兹發兆萌黃鍾建子漸通理天地經綸復更始日行黃道運其中月行九道為太一九道九鼎至神室上古軒轅曾制服黃帝乘龍升紫微七十二臣皆羽客登雲天兮步虛空飛入金城兮丹霄偃仰從兹得作真銓客曾遇神君賜大藥隨鸞從駕經峨嵋不枉區區受勞役茅茨不剪路難行荆棘侵天沒遠山峨嵋峻嶺難登涉禮請皇人駕晚還不受傍門並小術不言咽唾成金液不煉小便為秋石不言辟穀與休糧不解搖肩並數息不曾閉目弄精魂不言握固擒魔賊不言陰景滋靈物不言三峰御女術成道成仙上上機世間學者不能依說與凡流都不信讀了旌陽記可知藥母論夫丹道者非人間五金八石朱砂水銀之所為也是無形合虛曠成虛無是謂真虛真虛之體還丹之基大藥之母大藥之母何形容形容體貌緣何質質者混成中有物有物來居象帝先象先真虛合自然真虛自然合色象色象之因神運轉運轉真虛虛不空不空之妙有神通通神神化神色黑黑者玄元藏道德道藏玄德大淵深深廣淵源號北溟北溟廣大生浩浩浩浩無邊無極道無極大道道生一一極高明先天得先天故為元始精六百萬歲道生成生成成道緣宗祖能生萬象為丹母母鉛黑母鉛黑時緣何得黑成水六元居北上應星辰主化育下生鉛精含五色色化青黃白赤黑黑者玄元是水基水者道樞其數一一者坎中真一之氣符合恍惚杳冥相須相將象龍須臾象虎虎龍之初夫何有乎陰陽感激無形合虛虛生於有有生於無無為之始有為之母四象之首五行之初丹砂之樞紐也樞杻者水火二氣相交也水火相爍也陰陽相勝也何以明乎略試之且壼中日月是水火之氣水氣潤下火氣炎上上降下升相交相迎相迎相接水激火滅火滅為土土能生金金能生水金水相生遞相含孕滋金而益水益水而滋金金水相符潤澤肌膚肌如瓊酥素真玉華延遐無價無價真珠丹砂形軀夫何有乎無質生質水火相滋二氣相須無形合虛合虛之體體用一斤之數數分兩弦覆仰兩圓論未合之先先定上下上弦數得八下弦數亦八以二八合上下得乾坤之體乾坤體一斤丹道正不傾剛柔有表裏金水分兩停陰陽有輕重有無互相用互用展三才乾坤合體哉乾卦象天覆者也三畫體連坤卦象地仰者也六斷通氣氣通往來三連通開爻開六斷乾卦三變坤卦三變乾連坤斷斷續連開黑白往來大哉黑白陽種陰栽栽培育種種出黃芽黃芽生汞汞吐三華汞結成砂砂如金粟一粒一服服食百日改形换骨骨變金石形神相得形神俱妙壽無窮極金砂聖德無質生質質生於無卦爻相符符合震兊坎離交會四象虛無不可畫圖元精難睹無形合虛無形之形虛化之化化丹砂者自然也丹砂化生於自然者妙用也妙者少女少女屬於兊方金母居金父之位長養堤防者也長者一也養者四也長養金水也金水乃四一三日配庚庚生兊户兊生乾父乾者金之父也金體以水火為基火盛消金金化為水和融周章其水北轉而東流滋震木之蒼蒼生角亢之龍光東方之宿荷南方之熒惑爍奎婁之氣整庚辛之位位應西方太白金堂金堂虎房調理陰陽陰含陽房昭明日所赫赫神方紫華鬱鬱光輝輝日日耀玄空光明相通上下貫通三才水火發為寒暑火升水降同日月之往來水火隨日月不虧明砂汞與鉛銀同一種一種靈苗神異藥黃芽一鼎分二八二十四鼎始華池終則神靈生白雪神符白雪能返魂下士聞之生謗瞋為何因既死如何得返魂既死永休魂魄散魄散魂消何處尋徐福經年採藥去仙草靈芝無覓處蓬萊仙草既無形且道返魂何所據我今說汝返魂藥返魂須是天魂魄此是人魂正祖宗返魂再活死形容回體再活復如故再生人世何法度其法度所生元胎魂父母父母元胎不可論浩浩生生萬種魂種於稼穡孕生胎胎卵濕化化生中或人或獸或禽蟲人獸禽蟲皆禀性性命相連魂擊命魂是金精作命基命基養性魂相隨性命相連擊魂魄魄屬杳冥魂恍惚恍惚窈冥二氣精能生萬象合乾坤乾坤大哉合門户易藴乾坤合烏兔烏精兔髓與魄魂根蒂相連屬性命煉魂煅魄作神丹攝召魂靈能返還不是神符並白雪一鼎丹砂效也難一鼎丹砂可服食久服回陽能换骨回陽换骨作真仙須是神符並白雪大哉神符真白雪返魂再活生徐甲此是玄元至妙門小法傍門定不能傍門小法術雖衆不能勝極真鉛汞真鉛真汞真龍虎龍虎輝光似盤古始青之下虎爭明奪神光兮分黃青龍虎精光兩相射採入蓬壼金世界中有留光聚寶臺寶華圓滿光明開光皎潔五色紅璃籠寶月忽然寶月罩紅璃互相籠罩光相結水火交纏混日月日月合璧如連環五星連珠貫五行貫穿五行不散失自然水火生神物神物異南極老人星呈瑞星呈瑞神助太陽生紫氣紫氣如烟直上騰上衝華蓋鼎中心鼎中盤結如霜雪上降下升相交接交接相連互枝柱玲瓏狀如珊瑚樹珊瑚散索枝零落陽剛漸長陰弱剝剝盡羣陰陽氣加丹成九轉結紫華紫華光裏撮金華撮得精英五帝華彩霞精分五名朝霞明暮霞神落霞靈飛霞降火霞迎迎霞嫁嫁還家家生五福真貴霞妙靈砂吉祥萬瑞大亨霞廣靈砂嘉瑞衆尊拱龍霞紫靈砂普濟羣仙萬歲霞萬靈砂點石為金如意霞寶靈砂五霞五石五靈砂太上玄元聖祖加加為五鼎紫神砂二十四鼎分五鼎加添水火煉成砂歲月連連相接接十二神符九白雪轉轉增添加日月日月增添水火加陰符陽符不可差不差不凶不改變白雪九年重入轉入轉砂神力加神符神藥藥變化藥屬陰陽陰陽屬卦卦火相扶陰陽相駕陰陽推遷整續無暇整爻續卦隨爻變化往來不定上中與下八千六百四十卦乾坤坎離計四卦離卦火升上坎卦水潤下坎離水火相驅駕相驅相駕火隨卦卦火虧盈還本源返本還源源又年又年又月月又日日合元符火記曆火合元符記不差火華曡曡纍精華至神至聖至靈至極不可加其福無量無邊至極不可加廣大神通靈變至極不可加三不加此是玄元聖祖砂三鼎砂六年紫靈砂七年紫壽砂八年紫金砂上品上藥藥靈紫篆神藥神符自天降地隨宜化質鬱鬱神祥萬瑞萬靈至尊至德變化不窮不可加曾將一粒變天涯既能濟命復齊家人能聞早勤修煉上帝邀君升大羅藥物是非論夫乾坤交媾萬物化生乾而不元元而不亨亨而不利利而不貞則違天背源陽無所施陰無以萌故上不降而下不升天不氤而地不氲既失冲和之造萬物何從而生哉是謂藥不正而違天火不合而背源火雖動而天符不應靈不降則魂以飛揚藥不正則風雲不濟虎無形則杳絶龍光且丹砂何從而生哉是知丹須藥化藥自丹生金碧經云㲉為金精水還黃液者藥之化也藥化則火動華浮迥然獨異母舍彼生涌成黃液是太陽之精氣號曰流珠流珠即流汞也日魂欲降如露華滴珠聚而為水流而為液凝而堅冰結霜玲瓏珊瑚屈曲華英桂樹寄名偃月靈芝結成大寶珠火運三光靈輝照夜此是陰陽相濟巽艮還坤陽往陰來明消生暗明暗者九盡也九盡則陽光漸亮神府藏輝光曜隱明靈砂伏體生暗者六生也六生為陰符之始六二晦己六三壬癸圓歸黑體此乃乾坤終始象逐爻生神變靈通藥之化也自然招霞攝彩聚景生靈引赫赫之日苗孕圓明之神藥招符造化虎瑞龍祥五音互奏瑶光結琥珀金膏六律遞遷丹砂點紅琉瑪瑙火虛明而經陰陽出入二分則金盛木榮鋪舒藥化藥化者是朱雀調運化得甲乙而滋丙丁滋養朱雞雞屬西位化兊方而為金金生於水配合壬癸水生於金氣禀庚辛金水相生自相含孕在母胎中曰金胎水母水火消爍或沉或浮浮者砂汞白沉者水鉛黑浮沉不定杳難窮測太上曰視之不見聽之不聞潜藏造化拘逐時分時分謂子午卯酉也復子則魚鱗狎獵姤午則馬齒如霜壯卯則琅玕鍾乳觀酉則羽翮摧傷剝戌則有似犬牙坤玄則陰生陽化夫坤生震兊乾乾生巽艮坤且乾納壬甲坎懷六戊艮合六丙震照六庚巽成六辛離藏六己坤包乙癸兊感六丁八卦從乾變十干合天元東方甲乙木者青龍也位角亢氐房心尾箕七宿其形如龍在於東方故曰青龍也南方丙丁火者朱雀也位井鬼柳星張翼軫七宿其形如鶉鳥在於南方故曰朱雀也西方庚辛金者白虎也位奎婁胃昴畢觜參七宿其形如虎在西方故曰白虎也北方壬癸水者玄武也位斗牛女虛危室壁七宿有龜蛇之體在北方故曰玄武也八卦乾成象四七運神功考日躔南北月度西東運移隨斗轉變化在其中中有靈砂鼎乾成水銀粉點汞作黃金何啻千萬鋌濟世不為多未足為神聖服餌作飛仙白日升青天超出三界外不被五行牽我命方在我永脫幽冥苦若非大還丹誰免歸泉路吾不敢虛說學者當自悟盡述三才理乾坤盡終始砂汞與鉛銀情性本同根會得聖人意造作黃金匱産出夜明砂丹砂號如意煉成無價珠壽命同天地得其理者須當愛敬覽此文者與君證性學者味而詳之作丹房之明鏡丹砂證道歌教子真妙言令子知道元無名天地始我得天地先有名萬物母萬物復洪源聚陰以為地積陽以為天盜得三才理丹砂合自然乾坤真正德晃朗生靈質杳杳復冥冥回光含太乙金以砂為主禀和水銀母太陽離火精射入希夷府靈英透景明光華赫然住白虎吸紅璃金華生玉芝欲凝成至藥萬化隨爻策丹象逐爻銖靈通難畫圖寶結藍天碧霞光分五色一號紫金紅二名飛白雪三曰天谷青四號黑鉛液五名中黃精固形萬萬春百骸搜九竅是病都除了救却老殘容身輕髮不皓續齒如銀玉視暗如燈燭隱跡在人間積行施陰德不是戀凡華玉清朝未得病者即與醫貧者贈黃白學者遺丹經指陳通口訣功行一朝圓天書朝太極真藥便是鉛真汞隨火發水火應天符不得差時節四季若不調寒暄不應律仲冬如炎暑仲夏濃霜雪多應更漏乖晦爽不明白坤火衰將滅陰侵萌未發水盛坎消陽火多將伐木相尅不相生陰陽不順律火金不返還斗錯移南北四七亂縱橫璇璣皆喪失鍊士審思之留心子細推知之不必言在勤而行之此書萬遍讀名曰上天梯許真君石函記
